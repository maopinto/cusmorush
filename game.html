<!DOCTYPE html>
<html lang="he">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>The Game</title>
  <link rel="stylesheet" href="./cssFiles/game.css" />
  <link rel="icon" href="./images/logo.png" />

  <script defer src="/javaScriptFiles/game/enemies.js"></script>
  <script defer src="./javaScriptFiles/game/enemySpawnTable.js"></script>
  <script defer src="./javaScriptFiles/game/pets.js"></script>
  <script defer src="./javaScriptFiles/game/bosses.js"></script>
  <script defer src="./javaScriptFiles/game/superAttacks.js"></script>
  <script defer src="./javaScriptFiles/game/game.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Archivo+Black&family=Bungee&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="phone-frame">
    <div class="screen">
      <div class="notch"></div>
      <canvas id="gameBoard"></canvas>
      <div id="victoryScreen" class="overlay hidden">
        <div class="victoryBox">
          <h2>🏆 Victory!</h2>
          <p id="rewardText"></p>

          <div class="victoryButtons">
            <button id="btnLobby">Lobby</button>
            <button id="btnNext">Next Level</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Player skins-->
  <img src="./images/game/sprites/playerSkins/playerSkin1.png" id="player" style="display: none;">
  <img src="./images/game/sprites/playerSkins/playerRedSkin.png" id="playerRedClassic" style="display: none;">
  <img src="./images/game/sprites/playerSkins/playerDarkReaper.png" id="playerDarkReaper" style="display: none;">
  <img src="./images/game/sprites/playerSkins/playerCelestialSakura.png" id="playerCelestialSakura"
    style="display: none;">
  <img src="./images/game/sprites/playerSkins/playerGoldenCore.png" id="playerGoldenCore" style="display: none;">

  <!--Player Weapons!-->
  <img src="./images/game/sprites/missileSprite.png" id="missile" style="display: none;">

  <!--Pet Sprites-->
  <img src="./images/game/sprites/petSprites/chimboSprite.png" id="chimboSprite" style="display: none;">
  <img src="./images/game/sprites/petSprites/SirenSPrite.png" id="sirenSprite" style="display: none;">

  <!--Enemies Sprites-->
  <img src="./images/game/sprites/enemiesSprites/Angler1Sprite.png" id="angler1Sprite" style="display: none;">
  <img src="./images/game/sprites/enemiesSprites/Angler2Sprite.png" id="angler2Sprite" style="display: none;">
  <img src="./images/game/sprites/enemiesSprites/Angler3Sprite.png" id="angler3Sprite" style="display: none;">

  <!--Bosses sprites-->
  <img src="./images/game/sprites/bossesSprites/boss1Sprite.png" id="boss1Sprite" style="display: none;">
  <img src="./images/game/sprites/bossesSprites/boss2Sprite.png" id="boss2Sprite" style="display: none;">

  <!--Bosses Bullets Sprites-->
  <img src="./images/game/sprites/bossesBullets/boss2BulletSprite.png" id="boss2BulletSprite" style="display: none;">
</body>

</html>
